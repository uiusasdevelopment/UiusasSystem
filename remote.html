<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Controle Remoto Uiusas System</title>
    <style>
        * { box-sizing: border-box; }
        body, html {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            background-color: #1a1a1a;
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden; /* Prevent scrolling */
            touch-action: none; /* Prevent browser gestures */
        }
        .container {
            display: flex;
            flex-direction: column;
            height: 100%;
        }
        .header {
            padding: 15px;
            text-align: center;
            background: #2a2a2a;
            border-bottom: 2px solid #00c3e3;
        }
        .header h1 {
            margin: 0; font-size: 1.2rem;
            color: #00c3e3;
        }
        .header p {
            margin: 5px 0 0 0; font-size: 0.8rem; color: #888;
        }
        .trackpad {
            flex: 1;
            background: radial-gradient(circle, #333, #222);
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .trackpad-hint {
            color: #555;
            font-size: 1.5rem;
            pointer-events: none;
            user-select: none;
        }
        .controls {
            display: flex;
            height: 80px;
            background: #2a2a2a;
            border-top: 2px solid #444;
        }
        .btn {
            flex: 1;
            background: none;
            border: none;
            border-right: 1px solid #444;
            color: white;
            font-size: 1.2rem;
            font-weight: bold;
        }
        .btn:last-child { border-right: none; }
        .btn:active { background: #444; }
        .status-dot {
            display: inline-block;
            width: 10px; height: 10px;
            border-radius: 50%;
            background-color: #e60012;
            margin-right: 5px;
        }
        .status-dot.connected { background-color: #00a651; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1><span class="status-dot" id="status-dot"></span> Controle Remoto</h1>
        <p id="status-text">Desconectado</p>
    </div>

    <div class="trackpad" id="trackpad">
        <div class="trackpad-hint">📱 Arraste para o Laser</div>
    </div>

    <div class="controls">
        <button class="btn" id="btn-prev">⬅️ Anterior</button>
        <button class="btn" id="btn-next">Próximo ➡️</button>
    </div>
</div>

<!-- Load Socket.IO from the local server -->
<script src="/socket.io/socket.io.js"></script>
<script>
    const socket = io();
    
    const statusDot = document.getElementById('status-dot');
    const statusText = document.getElementById('status-text');
    
    socket.on('connect', () => {
        statusDot.classList.add('connected');
        statusText.textContent = 'Conectado ao Computador!';
    });
    
    socket.on('disconnect', () => {
        statusDot.classList.remove('connected');
        statusText.textContent = 'Desconectado';
    });

    // Touch event handling for Trackpad
    const trackpad = document.getElementById('trackpad');
    
    // To prevent laser from jumping instantly when a new touch starts, 
    // we just track the current touch and send its coordinates.
    // The desktop will interpolate.
    trackpad.addEventListener('touchmove', (e) => {
        e.preventDefault(); // Stop scrolling
        if (e.touches.length > 0) {
            const touch = e.touches[0];
            const rect = trackpad.getBoundingClientRect();
            
            // Calculate percentage (0 to 1) based on trackpad size
            let x = (touch.clientX - rect.left) / rect.width;
            let y = (touch.clientY - rect.top) / rect.height;
            
            // Clamp values between 0 and 1
            x = Math.max(0, Math.min(1, x));
            y = Math.max(0, Math.min(1, y));
            
            socket.emit('laser_move', { x, y });
        }
    }, { passive: false });

    // Buttons
    document.getElementById('btn-prev').addEventListener('click', () => {
        socket.emit('slide_control', { action: 'prev' });
        // Provide haptic feedback if supported
        if (navigator.vibrate) navigator.vibrate(50);
    });
    
    document.getElementById('btn-next').addEventListener('click', () => {
        socket.emit('slide_control', { action: 'next' });
        if (navigator.vibrate) navigator.vibrate(50);
    });
</script>

</body>
</html>
